<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面向认知障碍人群的语音交互辅助系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d0f12;
      --surface:  #151820;
      --surface2: #1c2030;
      --border:   #ffffff0f;
      --border2:  #ffffff1a;
      --text:     #e8eaf0;
      --muted:    #606880;
      --accent:   #4f9eff;
      --accent2:  #2ecc8e;
      --user-bg:  #1a2d4a;
      --user-txt: #7ec8ff;
      --ai-bg:    #162a20;
      --ai-txt:   #7be0a8;
      --danger:   #ff5555;
      --warn:     #ffaa33;
      --purple:   #9b72f5;
      --mono:     'DM Mono', monospace;
      --sans:     'Noto Sans SC', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; overflow: hidden; }

    header { height: 48px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    header h1 { font-size: 13px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; }
    .header-tag { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .06em; }

    .layout { display: flex; height: calc(100vh - 48px); }

    .left-pane { flex: 1 1 60%; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }

    .pane-header { height: 36px; display: flex; align-items: center; padding: 0 16px; gap: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .pane-title { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    .status-pill { margin-left: auto; display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s, box-shadow .3s; }
    .status-dot.live { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .status-dot.warn { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: blink .8s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .video-wrap { flex: 1; overflow: hidden; position: relative; background: #000; }
    .video-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }

    .cam-overlay {
      display: none; position: absolute; inset: 0; background: rgba(0,0,0,.72);
      flex-direction: column; align-items: center; justify-content: center; gap: 14px; font-family: var(--mono);
    }
    .cam-overlay.visible { display: flex; }
    .cam-overlay p { font-size: 13px; color: var(--warn); }
    .reconnect-btn { padding: 8px 20px; border: 1px solid var(--warn); border-radius: 6px; background: transparent; color: var(--warn); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: background .15s; }
    .reconnect-btn:hover { background: rgba(255,170,51,.12); }
    .reconnect-btn:disabled { opacity: .5; cursor: not-allowed; }

    .scene-bar { height: 30px; display: flex; align-items: center; padding: 0 16px; gap: 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .scene-label-prefix { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .08em; flex-shrink: 0; }
    #scene-text { font-family: var(--mono); font-size: 11px; color: var(--accent2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    #scene-text.unknown { color: var(--muted); }

    /* Phase 8：意图模式指示器 */
    .mode-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      display: none;
      flex-shrink: 0;
    }
    .mode-badge.translate { display: block; background: #1a1828; color: var(--purple); border: 1px solid #9b72f522; }
    .mode-badge.help      { display: block; background: #2a1a10; color: var(--warn);   border: 1px solid #ffaa3322; }

    .asr-bar { height: 40px; display: flex; align-items: center; padding: 0 16px; gap: 10px; border-top: 1px solid var(--border); flex-shrink: 0; overflow: hidden; }
    .mic-icon { flex-shrink: 0; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
    .mic-icon svg { width: 14px; height: 14px; fill: var(--muted); transition: fill .2s; }
    .mic-icon.active svg { fill: var(--danger); filter: drop-shadow(0 0 4px var(--danger)); }
    #asr-text { font-size: 13px; color: var(--muted); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; transition: color .3s; }
    #asr-text.active { color: var(--user-txt); }

    .right-pane { flex: 0 0 380px; display: flex; flex-direction: column; min-width: 0; }

    #chat-list { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
    #chat-list::-webkit-scrollbar { width: 4px; }
    #chat-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .bubble { display: flex; flex-direction: column; gap: 3px; animation: rise .25s ease both; }
    @keyframes rise { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .bubble.user          { align-items: flex-end; }
    .bubble.ai            { align-items: flex-start; }
    .bubble.announce      { align-items: center; }
    .bubble.scene-bubble  { align-items: center; }

    .bubble-role { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .08em; padding: 0 4px; }
    .bubble-body { max-width: 92%; padding: 9px 13px; border-radius: 12px; font-size: 14px; line-height: 1.6; }

    /* 普通问答气泡 */
    .bubble.user .bubble-body  { background: var(--user-bg); color: var(--user-txt); border-radius: 12px 12px 3px 12px; border: 1px solid #4f9eff22; }
    .bubble.ai .bubble-body    { background: var(--ai-bg); color: var(--ai-txt); border-radius: 12px 12px 12px 3px; border: 1px solid #2ecc8e22; }
    .bubble.thinking .bubble-body { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-style: italic; }

    /* 翻译气泡：紫色系 */
    .bubble.user.mode-translate .bubble-body  { background: #1c1630; color: #c4a8ff; border: 1px solid #9b72f522; border-radius: 12px 12px 3px 12px; }
    .bubble.ai.mode-translate .bubble-body    { background: #1a1530; color: #b89cee; border: 1px solid #9b72f522; border-radius: 12px 12px 12px 3px; }

    /* 求助气泡：橙色系，字体稍大以示重要 */
    .bubble.user.mode-help .bubble-body  { background: #2a1e10; color: #ffc47a; border: 1px solid #ffaa3322; border-radius: 12px 12px 3px 12px; }
    .bubble.ai.mode-help .bubble-body    { background: #261a08; color: #ffb84d; border: 1px solid #ffaa3322; border-radius: 12px 12px 12px 3px; font-size: 15px; }

    /* 主动播报 / 场景小气泡 */
    .bubble.announce .bubble-body    { background: #1a1f10; color: #a0c060; border-radius: 8px; border: 1px solid #2ecc8e22; font-size: 12px; padding: 6px 12px; font-family: var(--mono); }
    .bubble.scene-bubble .bubble-body { background: #101820; color: #4f9eff88; border-radius: 6px; border: 1px solid #4f9eff18; font-size: 11px; padding: 4px 10px; font-family: var(--mono); }

    .typing-dots span { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--muted); margin: 0 2px; animation: dot 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot { 0%,80%,100%{transform:scale(1);opacity:.4} 40%{transform:scale(1.4);opacity:1} }

    .status-bar { height: 36px; border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 8px; flex-shrink: 0; }
    #conn-status { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    #conn-status.ok  { color: var(--accent2); }
    #conn-status.err { color: var(--danger); }

    .tts-indicator { display: none; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--accent); }
    .tts-indicator.visible { display: flex; }
    .tts-bar { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
    .tts-bar span { width: 2px; border-radius: 1px; background: var(--accent); animation: wave 1s ease-in-out infinite; }
    .tts-bar span:nth-child(1){height:4px} .tts-bar span:nth-child(2){height:8px;animation-delay:.15s}
    .tts-bar span:nth-child(3){height:12px;animation-delay:.3s} .tts-bar span:nth-child(4){height:8px;animation-delay:.45s}
    .tts-bar span:nth-child(5){height:4px;animation-delay:.6s}
    @keyframes wave { 0%,100%{transform:scaleY(.4)} 50%{transform:scaleY(1)} }

    .announce-toggle { margin-left: auto; display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--muted); cursor: pointer; user-select: none; }
    .toggle-track { width: 28px; height: 16px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border2); position: relative; transition: background .2s; }
    .toggle-track.on { background: #1a3a20; border-color: var(--accent2); }
    .toggle-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); position: absolute; top: 2px; left: 2px; transition: transform .2s, background .2s; }
    .toggle-track.on .toggle-thumb { transform: translateX(12px); background: var(--accent2); }

    .empty-hint { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); text-align: center; padding: 24px; }
    .empty-hint .hint-icon { font-size: 28px; opacity: .4; }
    .empty-hint p { font-size: 13px; line-height: 1.7; max-width: 240px; }
  </style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>面向认知障碍人群的智能语音交互辅助系统</h1>
  <span class="header-tag">职业识别语音交互辅助系统</span>
</header>

<div class="layout">
  <div class="left-pane">
    <div class="pane-header">
      <span class="pane-title">摄像头画面</span>
      <div class="status-pill">
        <div class="status-dot" id="cam-dot"></div>
        <span id="cam-label">连接中</span>
      </div>
    </div>

    <div class="video-wrap">
      <img id="cam-img" src="/video_feed" alt="camera">
      <div class="cam-overlay" id="cam-overlay">
        <p>摄像头信号中断</p>
        <button class="reconnect-btn" id="reconnect-btn" onclick="doReconnect()">重新连接</button>
      </div>
    </div>

    <div class="scene-bar">
      <span class="scene-label-prefix">当前场景</span>
      <span id="scene-text" class="unknown">识别中...</span>
      <!-- Phase 8：当前意图模式指示 -->
      <span class="mode-badge" id="mode-badge"></span>
    </div>

    <div class="asr-bar">
      <div class="mic-icon" id="mic-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.36 9.64A6 6 0 0 1 6.64 10.64M12 18v4m-4 0h8"/></svg>
      </div>
      <span id="asr-text">等待语音输入...</span>
    </div>
  </div>

  <div class="right-pane">
    <div class="pane-header">
      <span class="pane-title">对话记录</span>
      <div class="status-pill">
        <div class="status-dot" id="vad-dot"></div>
        <span id="vad-label">等待中</span>
      </div>
    </div>

    <div id="chat-list">
      <div class="empty-hint" id="empty-hint">
        <div class="hint-icon">🎤</div>
        <p>对着麦克风说话<br>说「我需要帮助」获取求助建议<br>说「帮我翻译」翻译下一句话</p>
      </div>
    </div>

    <div class="status-bar">
      <span id="conn-status">连接中...</span>
      <div class="tts-indicator" id="tts-indicator">
        <div class="tts-bar"><span></span><span></span><span></span><span></span><span></span></div>
        <span>播报中</span>
      </div>
      <div class="announce-toggle" id="announce-toggle" title="切换主动播报">
        <div class="toggle-track on" id="toggle-track"><div class="toggle-thumb"></div></div>
        <span id="toggle-label">主动播报</span>
      </div>
    </div>
  </div>
</div>

<script>
  const chatList    = document.getElementById('chat-list');
  const asrText     = document.getElementById('asr-text');
  const micIcon     = document.getElementById('mic-icon');
  const vadDot      = document.getElementById('vad-dot');
  const connStatus  = document.getElementById('conn-status');
  const ttsIndicator = document.getElementById('tts-indicator');
  const emptyHint   = document.getElementById('empty-hint');
  const toggleTrack = document.getElementById('toggle-track');
  const toggleLabel = document.getElementById('toggle-label');
  const camDot      = document.getElementById('cam-dot');
  const camLabel    = document.getElementById('cam-label');
  const camOverlay  = document.getElementById('cam-overlay');
  const camImg      = document.getElementById('cam-img');
  const sceneText   = document.getElementById('scene-text');
  const modeBadge   = document.getElementById('mode-badge');

  let thinkingBubble = null;
  let ttsTimer = null;
  let announceEnabled = true;
  let modeTimer = null;

  // ── 摄像头断流检测 ─────────────────────────────────────────────────────────
  function setCamState(alive) {
    if (alive) {
      camDot.className = 'status-dot live';
      camLabel.textContent = '直播中';
      camOverlay.classList.remove('visible');
    } else {
      camDot.className = 'status-dot warn';
      camLabel.textContent = '已断开';
      camOverlay.classList.add('visible');
    }
  }
  setInterval(() => {
    fetch('/camera/status').then(r => r.json()).then(d => setCamState(d.alive)).catch(() => setCamState(false));
  }, 3000);
  camImg.onload = () => setCamState(true);

  function doReconnect() {
    const btn = document.getElementById('reconnect-btn');
    btn.disabled = true; btn.textContent = '连接中...';
    fetch('/camera/reconnect', { method: 'POST' }).then(r => r.json()).then(d => {
      if (d.alive) { camImg.src = '/video_feed?' + Date.now(); setCamState(true); }
      else { btn.disabled = false; btn.textContent = '重试'; }
    }).catch(() => { btn.disabled = false; btn.textContent = '重试'; });
  }

  // ── Phase 8：意图模式指示 ──────────────────────────────────────────────────
  function showModeBadge(mode) {
    modeBadge.className = 'mode-badge ' + mode;
    if (mode === 'translate') modeBadge.textContent = '翻译模式';
    else if (mode === 'help')  modeBadge.textContent = '求助模式';
    if (modeTimer) clearTimeout(modeTimer);
    // 翻译模式等待用户下一句话，保持显示；其他模式 4s 后消失
    if (mode !== 'translate') {
      modeTimer = setTimeout(() => { modeBadge.className = 'mode-badge'; }, 4000);
    }
  }
  function clearModeBadge() {
    if (modeTimer) clearTimeout(modeTimer);
    modeBadge.className = 'mode-badge';
  }

  // ── 气泡 ───────────────────────────────────────────────────────────────────
  function removeEmpty() {
    if (emptyHint && emptyHint.parentNode) emptyHint.remove();
  }

  function addBubble(role, bodyHtml, mode, isThinking = false) {
    removeEmpty();
    if (role === 'ai' && thinkingBubble) { thinkingBubble.remove(); thinkingBubble = null; }

    const wrap = document.createElement('div');
    let cls = `bubble ${role}`;
    if (mode && mode !== 'qa' && mode !== 'announce' && mode !== 'scene') cls += ` mode-${mode}`;
    if (isThinking) cls += ' thinking';
    wrap.className = cls;

    const roleTag = document.createElement('div');
    roleTag.className = 'bubble-role';
    const labels = { user: '用户', ai: '助手', announce: '播报', 'scene-bubble': '场景' };
    roleTag.textContent = labels[role] || 'ASSISTANT';
    wrap.appendChild(roleTag);

    const body = document.createElement('div');
    body.className = 'bubble-body';
    body.innerHTML = bodyHtml;
    wrap.appendChild(body);

    chatList.appendChild(wrap);
    chatList.scrollTop = chatList.scrollHeight;
    if (isThinking) thinkingBubble = wrap;
    return wrap;
  }

  function flashMic() {
    micIcon.classList.add('active'); asrText.classList.add('active');
    setTimeout(() => { micIcon.classList.remove('active'); asrText.classList.remove('active'); }, 2000);
  }

  function showTTS() {
    ttsIndicator.classList.add('visible');
    if (ttsTimer) clearTimeout(ttsTimer);
    ttsTimer = setTimeout(() => ttsIndicator.classList.remove('visible'), 4000);
  }

  function updateScene(label) {
    if (!label) return;
    sceneText.textContent = label;
    sceneText.classList.remove('unknown');
  }

  fetch('/scene').then(r => r.json()).then(d => updateScene(d.scene)).catch(() => {});

  // ── 主动播报开关 ──────────────────────────────────────────────────────────
  document.getElementById('announce-toggle').addEventListener('click', () => {
    announceEnabled = !announceEnabled;
    toggleTrack.classList.toggle('on', announceEnabled);
    toggleLabel.textContent = announceEnabled ? '主动播报' : '播报已关';
    fetch('/auto_announce', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({enabled: announceEnabled}) });
  });

  // ── ASR SSE ────────────────────────────────────────────────────────────────
  function connectASR() {
    const es = new EventSource('/asr_stream');
    es.onopen = () => {
      connStatus.textContent = '● 已连接'; connStatus.className = 'ok';
      vadDot.classList.add('live');
    };
    es.onmessage = e => {
      const text = e.data.trim();
      if (!text) return;
      asrText.textContent = text;
      flashMic();
    };
    es.onerror = () => {
      connStatus.textContent = '● 重连中...'; connStatus.className = 'err';
      vadDot.classList.remove('live'); es.close(); setTimeout(connectASR, 3000);
    };
  }

  // ── Chat SSE ───────────────────────────────────────────────────────────────
  function connectChat() {
    const es = new EventSource('/chat_stream');
    es.onmessage = e => {
      const raw = e.data.trim();
      if (!raw) return;
      try {
        const { role, text, mode } = JSON.parse(raw);

        if (role === 'user') {
          addBubble('user', escHtml(text), mode);
          // 翻译触发词：显示模式指示；其他：加思考气泡
          if (mode === 'translate' && text.includes('翻译')) {
            showModeBadge('translate');
          } else if (mode === 'help') {
            showModeBadge('help');
            addBubble('ai', '<div class="typing-dots"><span></span><span></span><span></span></div>', mode, true);
          } else {
            clearModeBadge();
            addBubble('ai', '<div class="typing-dots"><span></span><span></span><span></span></div>', mode, true);
          }

        } else if (role === 'assistant') {
          addBubble('ai', escHtml(text), mode);
          showTTS();
          // 翻译等待提示结束后清除 badge；翻译结果回来后也清除
          if (mode === 'translate') clearModeBadge();

        } else if (role === 'announce') {
          addBubble('announce', '📢 ' + escHtml(text), 'announce');
          showTTS();

        } else if (role === 'scene') {
          updateScene(text);
          addBubble('scene-bubble', '📍 ' + escHtml(text), 'scene');
        }
      } catch(_) {}
    };
    es.onerror = () => { es.close(); setTimeout(connectChat, 3000); };
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  connectASR();
  connectChat();
</script>
</body>
</html>
