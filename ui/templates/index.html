<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>职业识别辅助系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #f0f0f0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 16px;
    }
    h1 { font-size: 20px; font-weight: 500; }
    #video-wrap {
      width: 100%;
      max-width: 900px;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }
    #video-wrap img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <h1>职业识别语音交互辅助系统</h1>
  <div id="video-wrap">
    <img src="/video_feed" alt="摄像头画面">
  </div>
</body>
</html>
