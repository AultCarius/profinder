<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>职业识别辅助系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      color: #f0f0f0;
      font-family: "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 14px;
    }

    h1 { font-size: 20px; font-weight: 500; letter-spacing: 2px; }

    /* 摄像头画面 */
    #video-wrap {
      width: 100%;
      max-width: 900px;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }
    #video-wrap img { width: 100%; display: block; }

    /* 通用面板 */
    .panel {
      width: 100%;
      max-width: 900px;
      background: #242424;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .panel-header {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ASR 面板 */
    #mic-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background .2s;
    }
    #mic-dot.active { background: #e74c3c; animation: pulse .8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    #asr-list {
      font-size: 15px;
      line-height: 1.6;
      max-height: 80px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .asr-item { color: #ccc; }
    .asr-item.latest { color: #7ecfff; }

    /* 对话面板 */
    #chat-list {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-bubble {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.5;
      animation: fadein .3s ease;
    }
    @keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

    /* 用户气泡：右对齐，蓝色 */
    .chat-bubble.user {
      align-self: flex-end;
      background: #1a3a5c;
      color: #a8d8ff;
    }
    /* 助手气泡：左对齐，深绿 */
    .chat-bubble.assistant {
      align-self: flex-start;
      background: #1a3a28;
      color: #a8e0c0;
    }
    /* 思考中占位 */
    .chat-bubble.thinking {
      align-self: flex-start;
      background: #2a2a2a;
      color: #666;
      font-style: italic;
    }
    .chat-bubble .role-tag {
      font-size: 11px;
      margin-bottom: 3px;
      opacity: .6;
    }

    /* 状态栏 */
    #status-bar {
      font-size: 12px;
      color: #444;
      align-self: flex-start;
      max-width: 900px;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>职业识别语音交互辅助系统</h1>

  <div id="video-wrap">
    <img src="/video_feed" alt="摄像头画面">
  </div>

  <!-- ASR 转写面板 -->
  <div class="panel">
    <div class="panel-header">
      <div id="mic-dot"></div>
      <span>语音转写</span>
    </div>
    <div id="asr-list">
      <div class="asr-item latest">等待语音输入...</div>
    </div>
  </div>

  <!-- 对话记录面板 -->
  <div class="panel">
    <div class="panel-header">
      <span>💬</span>
      <span>对话记录</span>
    </div>
    <div id="chat-list">
      <div class="chat-bubble thinking">
        <div>对话将在这里显示...</div>
      </div>
    </div>
  </div>

  <div id="status-bar">连接中...</div>

  <script>
    const asrList   = document.getElementById('asr-list');
    const chatList  = document.getElementById('chat-list');
    const micDot    = document.getElementById('mic-dot');
    const statusBar = document.getElementById('status-bar');
    const MAX_ASR   = 5;
    const MAX_CHAT  = 20;

    // ── ASR 更新 ────────────────────────────────────────────────────────
    function addAsrItem(text) {
      // 清除占位
      const ph = asrList.querySelector('.latest');
      if (ph && ph.textContent === '等待语音输入...') ph.remove();

      asrList.querySelectorAll('.asr-item').forEach(el => el.classList.remove('latest'));

      const el = document.createElement('div');
      el.className = 'asr-item latest';
      el.textContent = text;
      asrList.appendChild(el);

      const items = asrList.querySelectorAll('.asr-item');
      if (items.length > MAX_ASR) items[0].remove();
      asrList.scrollTop = asrList.scrollHeight;

      micDot.classList.add('active');
      setTimeout(() => micDot.classList.remove('active'), 1500);
    }

    // ── 对话气泡 ─────────────────────────────────────────────────────────
    let thinkingBubble = null;

    function addChatBubble(role, text) {
      // 移除初始占位
      const ph = chatList.querySelector('.thinking');
      if (ph && ph.textContent.trim() === '对话将在这里显示...') ph.remove();

      // 若是助手消息，先移除"思考中"占位
      if (role === 'assistant' && thinkingBubble) {
        thinkingBubble.remove();
        thinkingBubble = null;
      }

      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${role}`;

      const tag = document.createElement('div');
      tag.className = 'role-tag';
      tag.textContent = role === 'user' ? '🎤 你' : '🤖 助手';
      bubble.appendChild(tag);

      const body = document.createElement('div');
      body.textContent = text;
      bubble.appendChild(body);

      chatList.appendChild(bubble);

      // 用户消息后加一个"思考中"占位
      if (role === 'user') {
        thinkingBubble = document.createElement('div');
        thinkingBubble.className = 'chat-bubble thinking';
        thinkingBubble.textContent = '正在思考...';
        chatList.appendChild(thinkingBubble);
      }

      const items = chatList.querySelectorAll('.chat-bubble:not(.thinking)');
      if (items.length > MAX_CHAT) items[0].remove();
      chatList.scrollTop = chatList.scrollHeight;
    }

    // ── SSE 连接 ─────────────────────────────────────────────────────────
    function connectSSE(url, onMessage, onOpen) {
      const es = new EventSource(url);
      es.onopen = onOpen || (() => {});
      es.onmessage = e => onMessage(e.data.trim());
      es.onerror = () => {
        es.close();
        setTimeout(() => connectSSE(url, onMessage, onOpen), 3000);
      };
    }

    // ASR 流
    connectSSE('/asr_stream',
      text => { if (text) addAsrItem(text); },
      () => { statusBar.textContent = '● 已连接'; statusBar.style.color = '#2ecc71'; }
    );

    // 对话流
    connectSSE('/chat_stream', raw => {
      if (!raw) return;
      try {
        const { role, text } = JSON.parse(raw);
        addChatBubble(role, text);
      } catch(e) {}
    });
  </script>
</body>
</html>
